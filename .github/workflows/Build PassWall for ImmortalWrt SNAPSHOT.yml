name: Build PassWall for ImmortalWrt SNAPSHOT

on:
  workflow_dispatch:
    inputs:
      target_arch:
        description: '目标架构（如 x86_64/armvirt-64/mipsel_24kc）'
        required: true
        default: 'x86_64'

env:
  PASSWALL_REPO: "https://github.com/Openwrt-Passwall/openwrt-passwall.git"
  PASSWALL_PACKAGES_REPO: "https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git"
  IMMORTALWRT_REPO: "https://github.com/immortalwrt/immortalwrt.git"
  IMMORTALWRT_BRANCH: "master"

jobs:
  build-passwall:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 清理残留目录
        run: rm -rf ./immortalwrt

      - name: 安装基础编译环境
        run: |
          sudo apt update -y
          sudo apt install -y --no-install-recommends \
            build-essential libncurses5-dev libncursesw5-dev zlib1g-dev \
            gawk git gettext libssl-dev xsltproc wget unzip python3 curl \
            flex bison ccache automake libtool binutils-dev bc patch \
            qemu-utils swig file libelf-dev libdeflate-dev openssl gzip
          sudo apt clean

      - name: 克隆ImmortalWrt源码
        run: |
          git clone --depth 1 --branch $IMMORTALWRT_BRANCH $IMMORTALWRT_REPO immortalwrt
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 配置PassWall仓库
        run: |
          cd immortalwrt
          sed -i '/passwall/d' feeds.conf.default
          echo "src-git passwall $PASSWALL_REPO" >> feeds.conf.default
          echo "src-git passwall_packages $PASSWALL_PACKAGES_REPO" >> feeds.conf.default
          ./scripts/feeds update passwall passwall_packages
          ./scripts/feeds install -a -p passwall

      - name: 配置编译参数
        run: |
          cd immortalwrt
          TARGET_ARCH="${{ github.event.inputs.target_arch }}"
          [ -z "$TARGET_ARCH" ] && TARGET_ARCH="x86_64"
          
          # 架构配置
          case $TARGET_ARCH in
            x86_64)
              echo -e "CONFIG_TARGET_x86=y\nCONFIG_TARGET_x86_64=y\nCONFIG_TARGET_x86_64_Default=y" >> .config
              ;;
            armvirt-64)
              echo -e "CONFIG_TARGET_armvirt=y\nCONFIG_TARGET_armvirt_64=y\nCONFIG_TARGET_armvirt_64_Default=y" >> .config
              ;;
            mipsel_24kc)
              echo -e "CONFIG_TARGET_ramips=y\nCONFIG_TARGET_ramips_mt7620=y\nCONFIG_TARGET_ramips_mt7620_Default=y" >> .config
              ;;
            *)
              echo "不支持的架构: $TARGET_ARCH" && exit 1
              ;;
          esac

          # 核心配置
          echo -e "CONFIG_PACKAGE_luci=y\nCONFIG_PACKAGE_luci-app-passwall=y\nCONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y" >> .config
          echo -e "CONFIG_ALL_KMODS=n\nCONFIG_ALL_NONSHARED=n\nCONFIG_ALL_PACKAGES=n" >> .config
          make defconfig

      - name: 修复编译工具链（核心）
        run: |
          cd immortalwrt
          # 创建工具目录并映射系统工具
          mkdir -p staging_dir/host/bin
          ln -sf /usr/bin/openssl staging_dir/host/bin/openssl
          ln -sf /usr/bin/gzip staging_dir/host/bin/libdeflate-gzip
          # 强制使用系统工具解压lua源码
          sed -i 's/staging_dir\/host\/bin\/libdeflate-gzip/gzip/g' package/utils/lua/Makefile

      - name: 编译PassWall插件
        run: |
          cd immortalwrt
          # 单线程编译避免冲突
          make package/luci-app-passwall/compile V=s -j1

      - name: 收集产物
        run: |
          mkdir -p passwall-ipk
          find immortalwrt/bin/packages -name "luci-app-passwall*" -exec cp {} passwall-ipk/ \;
          ls -lh passwall-ipk/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: passwall-immortalwrt-${{ github.event.inputs.target_arch }}
          path: passwall-ipk/
