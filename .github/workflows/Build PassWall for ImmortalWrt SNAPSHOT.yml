name: Build PassWall for ImmortalWrt SNAPSHOT

on:
  workflow_dispatch:
    inputs:
      target_arch:
        description: '目标架构（如 x86_64/armvirt-64/mipsel_24kc）'
        required: true
        default: 'x86_64'
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/**'

env:
  PASSWALL_REPO: "https://github.com/Openwrt-Passwall/openwrt-passwall.git"
  PASSWALL_PACKAGES_REPO: "https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git"
  IMMORTALWRT_REPO: "https://github.com/immortalwrt/immortalwrt.git"
  IMMORTALWRT_BRANCH: "master"
  # 统一工作目录（避免路径错误）
  WORK_DIR: "/home/runner/work/openwrt-passwall/openwrt-passwall/immortalwrt"

jobs:
  build-passwall:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 清理残留目录
        run: |
          rm -rf ./immortalwrt
          ls -la

      - name: 完整环境初始化（补全所有工具链）
        run: |
          # 更新源并安装全量编译工具+系统级openssl
          sudo apt update -y
          sudo apt install -y --no-install-recommends \
            build-essential libncurses5-dev libncursesw5-dev \
            zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3 \
            python3-pip rsync curl flex bison ccache automake libtool binutils-dev \
            bc patch qemu-utils swig file libelf-dev libdeflate-dev \
            ruby lm-sensors libpam0g-dev libtirpc-dev libgpiod-dev libsnmp-dev \
            policycoreutils libsepol-dev libselinux1-dev openssl
          # 提前创建完整目录结构
          mkdir -p ${WORK_DIR}/staging_dir/host/bin
          # 1. 修复libdeflate-gzip（使用系统gzip替代）
          sudo ln -sf /usr/bin/gzip ${WORK_DIR}/staging_dir/host/bin/libdeflate-gzip
          # 2. 修复openssl（使用系统openssl替代）
          sudo ln -sf /usr/bin/openssl ${WORK_DIR}/staging_dir/host/bin/openssl
          # 验证软链接
          ls -la ${WORK_DIR}/staging_dir/host/bin/
          sudo apt clean && sudo rm -rf /var/lib/apt/lists/*

      - name: 克隆ImmortalWrt最新源码
        run: |
          git clone --depth 1 --branch ${IMMORTALWRT_BRANCH} ${IMMORTALWRT_REPO} immortalwrt || (rm -rf immortalwrt && git clone --depth 1 --branch ${IMMORTALWRT_BRANCH} ${IMMORTALWRT_REPO} immortalwrt)
          cd immortalwrt
          echo "ImmortalWrt 最新Commit: $(git rev-parse --short HEAD)"
          # 更新feeds并安装
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 配置新PassWall仓库及依赖
        run: |
          cd immortalwrt
          sed -i '/passwall/d' feeds.conf.default
          echo "src-git passwall ${PASSWALL_REPO}" >> feeds.conf.default
          echo "src-git passwall_packages ${PASSWALL_PACKAGES_REPO}" >> feeds.conf.default
          ./scripts/feeds update passwall passwall_packages
          ./scripts/feeds install -a -p passwall
          ./scripts/feeds install -a -p passwall_packages

      - name: 配置编译参数
        run: |
          cd immortalwrt
          TARGET_ARCH="${{ github.event.inputs.target_arch }}"
          if [ -z "${TARGET_ARCH}" ]; then
            TARGET_ARCH="x86_64"
          fi
          echo "当前编译架构: ${TARGET_ARCH}"

          # 架构配置
          case "${TARGET_ARCH}" in
            x86_64)
              echo "CONFIG_TARGET_x86=y" >> .config
              echo "CONFIG_TARGET_x86_64=y" >> .config
              echo "CONFIG_TARGET_x86_64_Default=y" >> .config
              ;;
            armvirt-64)
              echo "CONFIG_TARGET_armvirt=y" >> .config
              echo "CONFIG_TARGET_armvirt_64=y" >> .config
              echo "CONFIG_TARGET_armvirt_64_Default=y" >> .config
              ;;
            mipsel_24kc)
              echo "CONFIG_TARGET_ramips=y" >> .config
              echo "CONFIG_TARGET_ramips_mt7620=y" >> .config
              echo "CONFIG_TARGET_ramips_mt7620_Default=y" >> .config
              ;;
            *)
              echo "错误：不支持的架构 '${TARGET_ARCH}'，支持的架构：x86_64/armvirt-64/mipsel_24kc"
              exit 1
              ;;
          esac

          # 启用必要依赖
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_lm-sensors=y" >> .config
          echo "CONFIG_PACKAGE_libpam=y" >> .config
          echo "CONFIG_PACKAGE_libtirpc=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-samba4=y" >> .config
          echo "CONFIG_PACKAGE_wsdd2=y" >> .config
          echo "CONFIG_PACKAGE_libnetsnmp=y" >> .config
          echo "CONFIG_PACKAGE_libgpiod=y" >> .config
          # 启用PassWall
          echo "CONFIG_PACKAGE_luci-app-passwall=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y" >> .config
          # 禁用全量编译
          echo "CONFIG_ALL_KMODS=n" >> .config
          echo "CONFIG_ALL_NONSHARED=n" >> .config
          echo "CONFIG_ALL_PACKAGES=n" >> .config
          # 生成配置
          make defconfig

      - name: 预编译基础工具链（核心修复）
        run: |
          cd immortalwrt
          # 先编译host端基础工具（openssl/lua依赖）
          make tools/openssl/compile V=s -j$(nproc)
          make tools/gzip/compile V=s -j$(nproc)
          # 重新创建软链接（确保生效）
          ln -sf /usr/bin/gzip ${WORK_DIR}/staging_dir/host/bin/libdeflate-gzip
          ln -sf /usr/bin/openssl ${WORK_DIR}/staging_dir/host/bin/openssl
          # 编译lua和luci-base
          make package/utils/lua/compile V=s -j$(nproc)
          make package/feeds/luci/luci-base/compile V=s -j$(nproc)

      - name: 编译PassWall插件
        run: |
          cd immortalwrt
          # 单线程编译PassWall保证稳定
          make package/luci-app-passwall/compile V=s -j1
          # 多线程编译依赖
          make package/passwall-deps/compile V=s -j$(nproc)

      - name: 收集编译产物
        run: |
          mkdir -p passwall-ipk
          find immortalwrt/bin/packages -name "luci-app-passwall*" -exec cp {} passwall-ipk/ \;
          find immortalwrt/bin/packages -name "passwall*" -exec cp {} passwall-ipk/ \;
          find immortalwrt/bin/packages -name "xray*" -o -name "v2ray*" -o -name "sing-box*" -exec cp {} passwall-ipk/ \;
          echo "编译产物列表："
          ls -lh passwall-ipk/

      - name: 上传产物到GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: passwall-immortalwrt-${{ github.event.inputs.target_arch }}-latest
          path: passwall-ipk/

      - name: （可选）上传到GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          files: passwall-ipk/*.ipk
          tag_name: immortalwrt-snapshot-latest-${{ github.run_id }}
          name: PassWall-${{ github.event.inputs.target_arch }} (ImmortalWrt-Latest)
          body: |
            适配ImmortalWrt SNAPSHOT（最新master源码）的PassWall插件
            架构：${{ github.event.inputs.target_arch }}
            编译时间：${{ github.run_started_at }}
            ImmortalWrt最新Commit: $(cd immortalwrt && git rev-parse --short HEAD)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
